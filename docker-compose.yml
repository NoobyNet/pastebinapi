version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pastebin-api
    ports:
      - "8000:8000"
    environment:
      - PASTEBIN_BASE_URL=${PASTEBIN_BASE_URL}
      - DEV_API_KEY=${DEV_API_KEY}
      - USER_NAME=${USER_NAME}
      - USER_PASSWORD=${USER_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
